<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro Component With Signup From</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <section class="hero">
                <div class="hero-content">
                    <h1 class="hero-title">Learn to code by watching others</h1>
                    <p class="hero-discription">See how experienced developers solve problems in real-time. Watching scripted tutorials is great, but understanding how developers think is invaluable.</p>
                </div>
                <div class="hero-form-container">
                    <div class="form-hero_banner">
                        <p class="form-hero_banner-text">Try it free 7 days <span>then $20/mo. thereafter</span></p>
                    </div>
                    <form action="submit" class="form-hero">
                        <input type="text" class="form-input input-name" placeholder="First Name">
                        <input type="text" class="form-input input-last_name" placeholder="Last Name">
                        <input type="text" class="form-input input-email" placeholder="Email Eddress">
                        <input type="text" class="form-input input-password" placeholder="Password">
                        
                        <button type="submit" class="form-submit">CLAIM YOUR FREE TRIAL</button>
                        
                        <p class="form-terms_text">By clicking the button, you are agreeing to our <span>Terms and Services</span></p>
                    </form>
                </div>
            </section>
        </div>
    </div>
    
    <script src="./js/script.js"></script>
</body>
</html>
